<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资源夜市 · 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .phone-frame {
            width: 375px;
            background: #0b0b0b;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            border: 1px solid #3a2e1c;
        }
        .phone-screen {
            height: 700px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #0b0b0b;
            scrollbar-width: none;
            padding-bottom: 20px;
        }
        .phone-screen::-webkit-scrollbar {
            display: none;
        }

        /* 顶部导航 */
        .nav-bar {
            display: flex;
            align-items: center;
            padding: 16px 16px 8px;
            border-bottom: 1px solid #3a2e1a;
            background: #0b0b0b;
        }
        .back-btn {
            font-size: 1.5rem;
            color: #b4a582;
            cursor: pointer;
            width: 32px;
            text-align: left;
        }
        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #cfb87c;
        }
        .placeholder {
            width: 32px;
        }

        /* 注册内容 */
        .register-content {
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo 区域 */
        .logo-area {
            margin-bottom: 30px;
            text-align: center;
        }
        .logo-circle {
            width: 70px;
            height: 70px;
            background: #1a170f;
            border: 2px solid #cfb87c;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #cfb87c;
        }
        .logo-area h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #cfb87c;
            letter-spacing: 1px;
        }

        /* 表单 */
        .form-group {
            width: 100%;
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #b4a582;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .input-wrapper {
            width: 100%;
            background: #1a170f;
            border: 1px solid #5f512f;
            border-radius: 30px;
            padding: 14px 20px;
            transition: border 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: #cfb87c;
        }
        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #f0e2c5;
            font-size: 1rem;
        }
        .input-wrapper input::placeholder {
            color: #5f543b;
            font-size: 0.9rem;
        }

        /* 密码提示 */
        .password-hint {
            font-size: 0.7rem;
            color: #5f543b;
            margin-top: 5px;
            padding-left: 15px;
        }

        /* 注册按钮 */
        .register-btn {
            width: 100%;
            background: linear-gradient(135deg, #D6B26E, #E6C37A);
            border: none;
            border-radius: 40px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #121212;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            margin-bottom: 25px;
        }
        .register-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* 额外链接 */
        .extra-links {
            text-align: center;
            width: 100%;
        }
        .login-link {
            margin-top: 10px;
        }
        .login-link span {
            color: #5f543b;
            font-size: 0.9rem;
        }
        .login-link a {
            color: #cfb87c;
            font-weight: 500;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }

        /* 协议提示 */
        .agreement {
            font-size: 0.7rem;
            color: #5f543b;
            margin-top: 20px;
            text-align: center;
        }
        .agreement a {
            color: #b4a582;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-screen">
            <!-- 顶部导航 -->
            <div class="nav-bar">
                <div class="back-btn" onclick="alert('返回')">←</div>
                <div class="nav-title">注册</div>
                <div class="placeholder"></div>
            </div>

            <!-- 注册内容 -->
            <div class="register-content">
                <!-- Logo 区域 -->
                <div class="logo-area">
                    <div class="logo-circle">✨</div>
                    <h2>加入资源夜市</h2>
                </div>

                <!-- 表单 -->
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="请输入用户名">
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="6-20位字符">
                    </div>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" placeholder="再次输入密码">
                    </div>
                </div>
                <div class="password-hint" id="passwordHint"></div>

                <button class="register-btn" onclick="handleRegister()">注册</button>

                <!-- 登录链接 -->
                <div class="extra-links">
                    <div class="login-link">
                        <span>已有账号？</span>
                        <a href="#" onclick="alert('跳转登录页')">去登录</a>
                    </div>
                </div>

                <!-- 协议提示 -->
                <div class="agreement">
                    点击注册即表示同意 <a href="#" onclick="alert('查看用户协议')">用户协议</a> 和 <a href="#" onclick="alert('查看隐私政策')">隐私政策</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const hint = document.getElementById('passwordHint');

            if (!username) {
                alert('请输入用户名');
                return;
            }
            if (password.length < 6) {
                alert('密码至少6位');
                return;
            }
            if (password !== confirm) {
                hint.innerText = '两次输入的密码不一致';
                hint.style.color = '#e74c3c';
                alert('两次输入的密码不一致');
                return;
            }
            hint.innerText = '';
            alert('注册成功（演示）');
            // 实际开发中可跳转登录页或自动登录
        }
    </script>
</body>
</html>
