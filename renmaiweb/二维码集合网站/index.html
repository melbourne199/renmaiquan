<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>资源夜市 · 微信码集合</title>
    <style>
        /* 此处省略样式（与您最后一次确认的版本完全一致） */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#0b0b0b; color:#e0d6bf; padding:20px; }
        .container { max-width:1400px; margin:0 auto; }
        .header { text-align:center; margin-bottom:30px; }
        .header h1 { font-size:2.2rem; color:#cfb87c; border-bottom:1px solid #3a2e1a; display:inline-block; padding-bottom:10px; }
        .header p { color:#b4a582; font-size:1.1rem; margin-top:15px; line-height:1.6; }
        .slogan { color:#a0937e; font-size:0.95rem; margin-top:15px; padding:0 20px; border-top:1px dashed #3a2e1a; padding-top:15px; max-width:700px; margin-left:auto; margin-right:auto; }
        .user-bar { display:flex; justify-content:flex-end; gap:15px; margin-bottom:20px; }
        .user-bar a, .user-bar button { color:#e0d6bf; background:#1a170f; border:1px solid #52472e; padding:8px 20px; border-radius:40px; font-size:0.95rem; cursor:pointer; white-space:nowrap; }
        .user-bar a:hover, .user-bar button:hover { background:#2f2a20; border-color:#b99b4b; }
        .toolbar { background:#1a170f; border-radius:40px; padding:20px 25px; margin-bottom:30px; border:1px solid #3a2e1c; display:flex; flex-wrap:wrap; gap:15px; align-items:center; }
        .search-box { flex:2 1 250px; display:flex; align-items:center; background:#26221a; border-radius:40px; padding:5px 20px; border:1px solid #52472e; }
        .search-box span { color:#cfb87c; margin-right:10px; font-size:1.2rem; }
        .search-box input { width:100%; background:transparent; border:none; padding:12px 0; color:#f0e2c5; font-size:1rem; outline:none; }
        .sort-buttons { display:flex; gap:6px; background:#26221a; border-radius:40px; padding:4px; border:1px solid #52472e; }
        .sort-btn { background:transparent; border:none; color:#a89f8e; padding:8px 18px; border-radius:30px; font-size:0.9rem; cursor:pointer; }
        .sort-btn.active { background:#e6c300; color:#0b0b0b; }
        .reset-btn { background:#2f2a20; border:1px solid #6b5d42; color:#e0d6bf; padding:10px 22px; border-radius:40px; font-size:0.95rem; cursor:pointer; }
        .upload-btn { background:#e6c300; border:none; color:#0b0b0b; padding:10px 28px; border-radius:40px; font-size:1rem; font-weight:600; cursor:pointer; box-shadow:0 4px 10px rgba(230,195,0,0.3); }
        @media (min-width:600px) { .toolbar { flex-wrap:nowrap; } }
        @media (max-width:599px) {
            .toolbar { padding:12px; gap:8px; }
            .search-box { width:calc(50% - 4px); padding:3px 12px; }
            .search-box input { padding:6px 0; font-size:0.85rem; }
            .sort-buttons { width:calc(50% - 4px); gap:2px; background:transparent; border:none; }
            .sort-buttons .sort-btn, .sort-buttons .reset-btn { flex:1; padding:6px 2px; font-size:0.65rem; background:#26221a; border:1px solid #52472e; border-radius:40px; }
            .upload-btn { width:100%; margin-top:4px; padding:8px 0; font-size:0.85rem; }
        }
        .qr-grid { display:grid; gap:20px; margin-top:10px; }
        @media (min-width:1200px) { .qr-grid { grid-template-columns:repeat(6,1fr); } }
        @media (min-width:992px) and (max-width:1199px) { .qr-grid { grid-template-columns:repeat(6,1fr); } }
        @media (min-width:768px) and (max-width:991px) { .qr-grid { grid-template-columns:repeat(5,1fr); } }
        @media (min-width:600px) and (max-width:767px) { .qr-grid { grid-template-columns:repeat(4,1fr); } }
        @media (max-width:599px) { .qr-grid { grid-template-columns:repeat(3,1fr); gap:8px; } }
        .qr-card { background:#191613; border-radius:16px; padding:12px 6px 10px; border:1px solid #3f3627; display:flex; flex-direction:column; cursor:pointer; width:100%; height:230px; box-sizing:border-box; }
        .qr-card.placeholder { opacity:0.9; }
        @media (max-width:599px) { .qr-card { height:200px; padding:8px 4px 6px; } }
        .qr-image-wrapper { flex:0 0 60%; display:flex; align-items:center; justify-content:center; margin-bottom:6px; }
        .qr-image { width:100%; aspect-ratio:1/1; background:#2b251b; border-radius:12px; padding:4px; display:flex; align-items:center; justify-content:center; background-image:url('https://quickchart.io/qr?text=resource-night-market&size=200&margin=1&dark=b38b40&light=0b0b0b'); background-size:cover; background-position:center; color:#fff; text-shadow:0 0 8px #000; font-size:1.4rem; font-weight:bold; }
        .qr-image span { display:block; background:#1a170f; padding:6px 12px; border-radius:30px; border:1px solid #b99b4b; color:#e0d6bf; }
        @media (max-width:599px) { .qr-image { font-size:1rem; } .qr-image span { padding:4px 8px; } }
        .qr-info { flex:1; display:flex; flex-direction:column; justify-content:space-around; text-align:center; }
        .qr-name { font-size:0.9rem; font-weight:700; color:#f0e2c5; width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .qr-industry, .qr-region { font-size:0.75rem; color:#c9b27c; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .qr-region { color:#9fc7b1; }
        .qr-members { font-size:0.75rem; color:#b4a582; }
        @media (max-width:599px) { .qr-name { font-size:0.8rem; } .qr-industry, .qr-region, .qr-members { font-size:0.65rem; } }
        footer { margin-top:40px; text-align:center; color:#5f543b; font-size:0.85rem; border-top:1px solid #2f2a1f; padding-top:25px; }
        .float-kefu { position:fixed; bottom:30px; right:30px; width:60px; height:60px; background:#b99b4b; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:1000; }
        .float-kefu span { font-size:2rem; color:#0b0b0b; }
        .kefu-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:1001; }
        .kefu-modal.active { display:flex; }
        .modal-content { background:#1a170f; border-radius:40px; padding:30px; border:2px solid #b99b4b; max-width:350px; width:90%; text-align:center; position:relative; }
        .qr-code-img { width:200px; height:200px; margin:0 auto 20px; background:#2b251b; border-radius:20px; padding:10px; border:1px solid #5f512f; }
        .qr-code-img img { width:100%; height:100%; object-fit:contain; }
        .modal-content .wechat-id { background:#2f2a1f; padding:8px 15px; border-radius:40px; display:inline-block; color:#cfb87c; border:1px solid #b99b4b; font-weight:600; cursor:pointer; }
        .close-modal { position:absolute; top:15px; right:20px; font-size:2rem; cursor:pointer; color:#9f8f6b; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>全国行业微信群二维码聚合平台</h1>
        <p>快速找人 · 找事 · 找关系<br>对接资源与合作伙伴的真实入口</p>
        <div class="slogan">
            汇聚人脉、资源、项目、关系、影响力、教育、金融等数十个行业优质社群
        </div>
    </div>

    <div class="user-bar">
        <span id="loginStatus"></span>
        <a href="login.html" id="loginLink">登录</a>
        <a href="register.html" id="registerLink">注册</a>
        <a href="upload.html" id="uploadLink" style="display:none;">上传群码</a>
        <a href="admin.html" id="adminLink" style="display:none;">后台管理</a>
        <button id="logoutBtn" style="display:none;">退出</button>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索群名、行业、地区...">
        </div>
        <div class="sort-buttons">
            <button class="sort-btn active" data-sort="default">默认</button>
            <button class="sort-btn" data-sort="desc">👥 人多</button>
            <button class="sort-btn" data-sort="asc">👤 人少</button>
            <button class="reset-btn" id="resetFilters">重置</button>
        </div>
        <button class="upload-btn" id="uploadBtn" onclick="location.href='upload.html'">+ 免费发布群码</button>
    </div>

    <div id="qrGridContainer" class="qr-grid"></div>
    <footer>© 资源夜市一条街 · 全国资源社群二维码聚合平台</footer>
</div>

<!-- 漂浮客服 -->
<div class="float-kefu" id="kefuBtn">
    <span>💬</span>
</div>
<div class="kefu-modal" id="kefuModal">
    <div class="modal-content">
        <span class="close-modal" id="closeKefu">&times;</span>
        <h3 style="color:#cfb87c;">联系客服</h3>
        <div class="qr-code-img">
            <img src="/kefu_qrcode.jpg" alt="客服微信二维码">
        </div>
        <p>长按识别添加客服</p>
        <p>或复制微信号：</p>
        <span class="wechat-id" id="wechatId">ataidm</span>
        <p style="font-size:0.8rem; margin-top:15px;">(点击上方微信号可复制)</p>
    </div>
</div>

<script>
    const USER_DATA_KEY = 'users';
    if (!localStorage.getItem(USER_DATA_KEY)) {
        localStorage.setItem(USER_DATA_KEY, JSON.stringify([
            { id: 1, username: 'admin', password: 'admin123', role: 'admin' },
            { id: 2, username: 'user', password: '123456', role: 'user' }
        ]));
    }

    function getCurrentUser() {
        const userJson = sessionStorage.getItem('user');
        return userJson ? JSON.parse(userJson) : null;
    }

    function updateUserBar() {
        const user = getCurrentUser();
        document.getElementById('loginStatus').innerText = user ? `欢迎, ${user.username}` : '';
        document.getElementById('loginLink').style.display = user ? 'none' : 'inline-block';
        document.getElementById('registerLink').style.display = user ? 'none' : 'inline-block';
        document.getElementById('logoutBtn').style.display = user ? 'inline-block' : 'none';
        document.getElementById('adminLink').style.display = user?.role === 'admin' ? 'inline-block' : 'none';
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.removeItem('token');
        sessionStorage.removeItem('user');
        location.reload();
    });

    let allQRCodes = [];

    function loadQRCodes() {
        fetch('/api/qrcodes')
            .then(res => res.json())
            .then(data => {
                allQRCodes = data;
                renderCards();
            })
            .catch(() => {
                document.getElementById('qrGridContainer').innerHTML = '<div class="empty-message">✨ 加载失败</div>';
            });
    }

    // 提取城市名（去掉省/自治区）
    function extractCity(region) {
        if (!region) return '未知';
        // 常见省份/自治区列表
        const provinceList = ['北京','天津','上海','重庆','河北','山西','辽宁','吉林','黑龙江','江苏','浙江','安徽','福建','江西','山东','河南','湖北','湖南','广东','海南','四川','贵州','云南','陕西','甘肃','青海','台湾','内蒙古','广西','西藏','宁夏','新疆','香港','澳门'];
        // 如果region包含省名，则截取省名之后的部分
        for (let p of provinceList) {
            if (region.includes(p)) {
                let after = region.split(p)[1];
                if (after) {
                    // 如果之后还有内容，通常是市名，但可能包含“省”或“市”字
                    after = after.replace(/^省|^市/, '');
                    return after.trim();
                }
            }
        }
        return region;
    }

    // 截断行业（最多6个字）
    function truncateIndustry(industry) {
        if (!industry) return '其他';
        return industry.length > 6 ? industry.slice(0, 6) + '…' : industry;
    }

    function renderCards() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const sort = document.querySelector('.sort-btn.active')?.dataset.sort || 'default';

        let filtered = allQRCodes.filter(item => {
            return !search || 
                item.name.toLowerCase().includes(search) ||
                (item.industry && item.industry.toLowerCase().includes(search)) ||
                (item.region && item.region.toLowerCase().includes(search));
        });

        if (sort === 'desc') filtered.sort((a,b) => b.members - a.members);
        else if (sort === 'asc') filtered.sort((a,b) => a.members - b.members);
        else filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

        const placeholders = [
            { isPlaceholder: true, text: '即将开放\n敬请期待', industry: '敬请期待', region: '即将上线', members: '筹备中' },
            { isPlaceholder: true, text: '即将开放\n敬请期待', industry: '敬请期待', region: '即将上线', members: '筹备中' },
            { isPlaceholder: true, text: '即将开放\n敬请期待', industry: '敬请期待', region: '即将上线', members: '筹备中' }
        ];
        const displayItems = [...filtered, ...placeholders];

        let html = '';
        displayItems.forEach(item => {
            if (item.isPlaceholder) {
                html += `
                    <div class="qr-card placeholder">
                        <div class="qr-image-wrapper"><div class="qr-image"><span>${item.text.replace('\n','<br>')}</span></div></div>
                        <div class="qr-info">
                            <div class="qr-name">宣传位</div>
                            <div class="qr-industry">${item.industry}</div>
                            <div class="qr-region">${item.region}</div>
                            <div class="qr-members">👥 ${item.members}</div>
                        </div>
                    </div>
                `;
            } else {
                const groupName = item.name && item.name.trim() ? item.name : '未命名群';
                const displayIndustry = truncateIndustry(item.industry);
                const displayRegion = extractCity(item.region || '未知');
                html += `
                    <div class="qr-card" data-id="${item.id}">
                        <div class="qr-image-wrapper"><div class="qr-image"><span>正在营业<br>欢迎入群</span></div></div>
                        <div class="qr-info">
                            <div class="qr-name">${groupName}</div>
                            <div class="qr-industry">${displayIndustry}</div>
                            <div class="qr-region">${displayRegion}</div>
                            <div class="qr-members">👥 ${item.members}人</div>
                        </div>
                    </div>
                `;
            }
        });
        document.getElementById('qrGridContainer').innerHTML = html;

        document.querySelectorAll('.qr-card:not(.placeholder)').forEach(card => {
            card.addEventListener('click', () => {
                const id = card.dataset.id;
                if (getCurrentUser()) {
                    window.location.href = `details.html?id=${id}`;
                } else {
                    alert('请先登录');
                    window.location.href = 'login.html';
                }
            });
        });
    }

    document.getElementById('searchInput').addEventListener('input', renderCards);
    document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            renderCards();
        });
    });
    document.getElementById('resetFilters').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.sort-btn[data-sort="default"]').classList.add('active');
        renderCards();
    });

    document.getElementById('uploadBtn').addEventListener('click', () => {
        if (getCurrentUser()) window.location.href = 'upload.html';
        else { alert('请先登录'); window.location.href = 'login.html'; }
    });

    // 客服功能
    const kefuBtn = document.getElementById('kefuBtn');
    const kefuModal = document.getElementById('kefuModal');
    const closeKefu = document.getElementById('closeKefu');
    const wechatIdSpan = document.getElementById('wechatId');
    kefuBtn.addEventListener('click', () => kefuModal.classList.add('active'));
    closeKefu.addEventListener('click', () => kefuModal.classList.remove('active'));
    kefuModal.addEventListener('click', (e) => { if (e.target === kefuModal) kefuModal.classList.remove('active'); });
    wechatIdSpan.addEventListener('click', () => {
        const text = wechatIdSpan.innerText;
        navigator.clipboard.writeText(text).then(() => alert('微信号已复制：' + text));
    });

    updateUserBar();
    loadQRCodes();
</script>
</body>
</html>
