<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - 资源夜市</title>
  <link rel="stylesheet" href="/styles/modern.css">
  <style>
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }

    .admin-sidebar {
      width: 260px;
      background: rgba(15, 14, 26, 0.95);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      padding: 24px 16px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .admin-logo {
      font-size: 20px;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding: 0 16px;
      margin-bottom: 32px;
    }

    .admin-nav-section {
      margin-bottom: 24px;
    }

    .admin-nav-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      padding: 0 16px;
      margin-bottom: 8px;
    }

    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition-fast);
      margin-bottom: 4px;
    }

    .admin-nav-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .admin-nav-item.active {
      background: var(--gradient-primary);
      color: white;
    }

    .admin-nav-icon {
      font-size: 18px;
    }

    .admin-main {
      flex: 1;
      margin-left: 260px;
      padding: 24px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .admin-title {
      font-size: 28px;
      font-weight: 700;
    }

    .admin-card {
      padding: 24px;
      margin-bottom: 24px;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-box {
      padding: 24px;
      background: var(--glass-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
    }

    .stat-box-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .stat-box-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-box-label {
      color: var(--text-muted);
      font-size: 14px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      text-align: left;
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .data-table td {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .data-table tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-pending {
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
    }

    .badge-approved {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
    }

    .badge-rejected {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .action-btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: var(--transition-fast);
    }

    .action-btn-approve {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
    }

    .action-btn-approve:hover {
      background: rgba(16, 185, 129, 0.3);
    }

    .action-btn-reject {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .action-btn-reject:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .login-card {
      max-width: 400px;
      margin: 100px auto;
      padding: 40px;
    }

    @media (max-width: 768px) {
      .admin-sidebar {
        display: none;
      }
      .admin-main {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <!-- 登录状态检查 -->
  <div id="login-check">
    <div class="glass-card login-card">
      <div style="text-align: center; margin-bottom: 32px;">
        <div style="font-size: 48px; margin-bottom: 16px;">🔐</div>
        <h2 style="font-size: 24px; margin-bottom: 8px;">管理员登录</h2>
        <p style="color: var(--text-muted);">请输入管理员账号</p>
      </div>
      <div class="auth-error" id="auth-error"></div>
      <form onsubmit="handleLogin(event)">
        <div class="input-group">
          <input type="text" class="input" placeholder="管理员用户名" id="admin-username" required>
        </div>
        <div class="input-group">
          <input type="password" class="input" placeholder="密码" id="admin-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;" id="login-btn">登录</button>
      </form>
    </div>
  </div>

  <!-- 管理后台 -->
  <div id="admin-content" style="display: none;">
    <div class="admin-layout">
      <!-- 侧边栏 -->
      <aside class="admin-sidebar">
        <div class="admin-logo">资源夜市管理后台</div>

        <div class="admin-nav-section">
          <div class="admin-nav-title">概览</div>
          <div class="admin-nav-item active" onclick="showSection('dashboard')">
            <span class="admin-nav-icon">📊</span>
            <span>仪表盘</span>
          </div>
        </div>

        <div class="admin-nav-section">
          <div class="admin-nav-title">内容管理</div>
          <div class="admin-nav-item" onclick="showSection('groups')">
            <span class="admin-nav-icon">🏘️</span>
            <span>群码审核</span>
          </div>
          <div class="admin-nav-item" onclick="showSection('enterprise')">
            <span class="admin-nav-icon">🏢</span>
            <span>企业资源</span>
          </div>
          <div class="admin-nav-item" onclick="showSection('projects')">
            <span class="admin-nav-icon">📊</span>
            <span>项目管理</span>
          </div>
          <div class="admin-nav-item" onclick="showSection('helps')">
            <span class="admin-nav-icon">🆘</span>
            <span>求助审核</span>
          </div>
          <div class="admin-nav-item" onclick="showSection('government')">
            <span class="admin-nav-icon">🏛️</span>
            <span>政务资源</span>
          </div>
        </div>

        <div class="admin-nav-section">
          <div class="admin-nav-title">用户</div>
          <div class="admin-nav-item" onclick="showSection('users')">
            <span class="admin-nav-icon">👥</span>
            <span>用户管理</span>
          </div>
        </div>

        <div class="admin-nav-section" style="margin-top: auto;">
          <div class="admin-nav-item" onclick="handleLogout()" style="color: #f87171;">
            <span class="admin-nav-icon">🚪</span>
            <span>退出登录</span>
          </div>
        </div>
      </aside>

      <!-- 主内容 -->
      <main class="admin-main">
        <!-- 仪表盘 -->
        <section id="section-dashboard">
          <div class="admin-header">
            <h1 class="admin-title">仪表盘</h1>
            <div style="color: var(--text-muted);" id="current-time"></div>
          </div>

          <div class="admin-stats">
            <div class="stat-box">
              <div class="stat-box-icon">👥</div>
              <div class="stat-box-value" id="stat-users">-</div>
              <div class="stat-box-label">用户总数</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-icon">🏘️</div>
              <div class="stat-box-value" id="stat-groups">-</div>
              <div class="stat-box-label">群码总数</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-icon">📊</div>
              <div class="stat-box-value" id="stat-projects">-</div>
              <div class="stat-box-label">项目总数</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-icon">⏳</div>
              <div class="stat-box-value" id="stat-pending">-</div>
              <div class="stat-box-label">待审核</div>
            </div>
          </div>

          <div class="glass-card admin-card">
            <h3 style="margin-bottom: 20px;">最近待审核</h3>
            <table class="data-table">
              <thead>
                <tr>
                  <th>类型</th>
                  <th>标题</th>
                  <th>发布者</th>
                  <th>时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="pending-table-body">
                <tr><td colspan="5" style="text-align: center; color: var(--text-muted);">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- 其他 section 简化展示 -->
        <section id="section-groups" style="display: none;">
          <div class="admin-header">
            <h1 class="admin-title">群码管理</h1>
          </div>
          <div class="glass-card admin-card">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>名称</th>
                  <th>地区</th>
                  <th>状态</th>
                  <th>时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="groups-table-body">
                <tr><td colspan="6" style="text-align: center; color: var(--text-muted);">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="/scripts/app.js"></script>
  <script>
    let currentSection = 'dashboard';

    document.addEventListener('DOMContentLoaded', () => {
      checkAdminLogin();
      updateTime();
      setInterval(updateTime, 1000);
    });

    async function checkAdminLogin() {
      if (!auth.isLoggedIn()) {
        document.getElementById('login-check').style.display = 'block';
        document.getElementById('admin-content').style.display = 'none';
        return;
      }

      try {
        const user = await auth.getMe();
        if (!user.is_admin) {
          showError('需要管理员权限');
          return;
        }
        document.getElementById('login-check').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadDashboard();
      } catch (err) {
        document.getElementById('login-check').style.display = 'block';
        document.getElementById('admin-content').style.display = 'none';
      }
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.classList.add('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = '登录中...';
      btn.disabled = true;

      try {
        await auth.login(
          document.getElementById('admin-username').value,
          document.getElementById('admin-password').value
        );
        checkAdminLogin();
      } catch (err) {
        showError(err.message);
        btn.textContent = '登录';
        btn.disabled = false;
      }
    }

    function handleLogout() {
      auth.logout();
      checkAdminLogin();
    }

    function updateTime() {
      const now = new Date();
      document.getElementById('current-time').textContent = now.toLocaleString('zh-CN');
    }

    async function loadDashboard() {
      try {
        // 加载统计数据
        const [users, groups] = await Promise.all([
          api('/admin/users'),
          api('/admin/groups')
        ]);

        document.getElementById('stat-users').textContent = users.length;
        document.getElementById('stat-groups').textContent = groups.length;

        const pending = groups.filter(g => g.status === 0);
        document.getElementById('stat-pending').textContent = pending.length;

        // 渲染待审核表格
        renderPendingTable([...pending]);
      } catch (err) {
        console.error('加载失败:', err);
      }
    }

    function renderPendingTable(items) {
      const tbody = document.getElementById('pending-table-body');
      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">暂无待审核内容</td></tr>';
        return;
      }

      tbody.innerHTML = items.slice(0, 5).map(item => `
        <tr>
          <td>🏘️ 群码</td>
          <td>${escapeHtml(item.name || '未命名')}</td>
          <td>用户 #${item.user_id}</td>
          <td>${formatDate(item.created_at)}</td>
          <td>
            <button class="action-btn action-btn-approve" onclick="approveItem('groups', ${item.id})">通过</button>
          </td>
        </tr>
      `).join('');
    }

    async function approveItem(type, id) {
      try {
        await api(`/admin/${type}/${id}/approve`, { method: 'POST' });
        showToast('审核通过', 'success');
        loadDashboard();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function showSection(section) {
      document.querySelectorAll('[id^="section-"]').forEach(el => el.style.display = 'none');
      document.getElementById(`section-${section}`).style.display = 'block';

      document.querySelectorAll('.admin-nav-item').forEach(el => el.classList.remove('active'));
      event.target.closest('.admin-nav-item').classList.add('active');

      currentSection = section;
    }
  </script>
</body>
</html>
