<!DOCTYPE html>
<html>
<head><title>发布群码</title>
<style>body{font-family:system-ui;padding:16px;background:#f5f5f7;}input,select,textarea{width:100%;padding:14px;border:1px solid #eee;border-radius:14px;margin-bottom:16px;}.btn{background:#0071E3;color:white;border:none;border-radius:30px;padding:16px;width:100%;}</style>
</head>
<body>
    <h2>发布行业群码</h2>
    <input placeholder="群名称">

    <select><option>北京市</option><option>上海市</option></select>
    <div style="border:2px dashed #ccc;padding:20px;text-align:center;margin-bottom:16px;">📷 上传群二维码</div>
    <div style="border:2px dashed #ccc;padding:20px;text-align:center;margin-bottom:16px;">📷 上传群主个人码</div>
    <div style="background:#fff3e0;padding:12px;border-radius:12px;margin-bottom:16px;">⚠️ 请将平台管理员拉入群聊并设置为管理员</div>
    <button class="btn">提交审核</button>
