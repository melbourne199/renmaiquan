<!DOCTYPE html>
<html>
<head><title>发布企业人脉</title>
<style>body{font-family:system-ui;padding:16px;background:#f5f5f7;}input,select{width:100%;padding:14px;border:1px solid #eee;border-radius:14px;margin-bottom:16px;}.btn{background:#0071E3;color:white;border:none;border-radius:30px;padding:16px;width:100%;}</style>
</head>
<body>
    <h2>发布企业人脉</h2>
    <input placeholder="公司名称">
    <select><option>技术部</option><option>财务部</option></select>
    <select><option>北京市</option><option>上海市</option></select>
    <select><option>1个月</option><option>3个月</option></select>
    <div style="border:2px dashed #ccc;padding:20px;text-align:center;margin-bottom:16px;">📷 微信群码（可选）</div>
    <button class="btn">提交审核</button>
</body>
</html>
