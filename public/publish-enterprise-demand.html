<!DOCTYPE html>
<html>
<head><title>发布企业需求</title>
<style>body{font-family:system-ui;padding:16px;background:#f5f5f7;}input,select,textarea{width:100%;padding:14px;border:1px solid #eee;border-radius:14px;margin-bottom:16px;}.btn{background:#0071E3;color:white;border:none;border-radius:30px;padding:16px;width:100%;}</style>
</head>
<body>
    <h2>发布企业需求</h2>
    <input placeholder="需求标题">
    <textarea placeholder="项目简介" rows="3"></textarea>
    <input placeholder="体量（万元）" type="number">
    <textarea placeholder="诉求" rows="2"></textarea>
    <textarea placeholder="进展" rows="2"></textarea>
    <select><option>IT互联网</option><option>教育培训</option></select>
    <select><option>北京市</option><option>上海市</option></select>
    <select><option>1个月</option><option>3个月</option></select>
    <button class="btn">提交审核</button>
</body>
</html>
