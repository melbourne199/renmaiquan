<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - 资源夜市一条街</title>
  <link rel="stylesheet" href="/styles/modern.css">
</head>
<body class="login-page">
  <div class="login-frame">
    <!-- 顶部导航 -->
    <div class="login-header">
      <div class="back-btn" onclick="window.location.href='/index.html'">←</div>
      <div class="login-title">登录</div>
      <div style="width: 32px;"></div>
    </div>

    <!-- 登录内容 -->
    <div class="login-content">
      <!-- Logo 区域 -->
      <div class="login-logo">
        <div class="login-logo-icon">⛩️</div>
        <h1>资源夜市</h1>
        <p>让连接更有价值</p>
      </div>

      <div class="auth-error" id="auth-error" style="display: none;"></div>

      <!-- 登录表单 -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <div class="input-wrapper">
            <input type="text" id="login-username" placeholder="请输入用户名" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-wrapper">
            <input type="password" id="login-password" placeholder="请输入密码" required>
          </div>
        </div>
        <button type="submit" class="login-btn-full" id="login-btn">登录</button>
      </form>

      <!-- 额外链接 -->
      <div class="login-extra">
        <a href="#" onclick="showToast('请联系管理员重置密码')">忘记密码？</a>
      </div>

      <div class="divider"><span>还没有账号？</span></div>

      <div class="login-extra">
        <span style="color: #5f543b;">立即</span>
        <a href="#" onclick="switchTab('register')">注册</a>
      </div>

      <!-- 注册表单（隐藏） -->
      <form id="register-form" style="display: none; width: 100%;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <div class="input-wrapper">
            <input type="text" id="reg-username" placeholder="请输入用户名（6位以上）" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-wrapper">
            <input type="password" id="reg-password" placeholder="请输入密码（6位以上）" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">确认密码</label>
          <div class="input-wrapper">
            <input type="password" id="reg-password-confirm" placeholder="请再次输入密码" required>
          </div>
        </div>
        <button type="submit" class="login-btn-full" id="register-btn">注册</button>
      </form>

      <div class="login-extra" style="margin-top: 20px;">
        <a href="#" onclick="switchTab('login')">已有账号？返回登录</a>
      </div>
    </div>
  </div>

  <script src="/scripts/app.js"></script>
  <script>
    // 检查是否已登录
    ifLoggedIn();

    function switchTab(tab) {
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('auth-error').style.display = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      btn.textContent = '登录中...';
      btn.disabled = true;
      hideError();

      try {
        await auth.login(username, password);
        showToast('登录成功！', 'success');
        setTimeout(() => window.location.href = '/index.html', 1000);
      } catch (err) {
        showError(err.message);
        btn.textContent = '登录';
        btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const username = document.getElementById('reg-username').value;
      const password = document.getElementById('reg-password').value;
      const passwordConfirm = document.getElementById('reg-password-confirm').value;

      if (password !== passwordConfirm) {
        showError('两次密码输入不一致');
        return;
      }

      if (password.length < 6) {
        showError('密码至少6位');
        return;
      }

      btn.textContent = '注册中...';
      btn.disabled = true;
      hideError();

      try {
        await auth.register(username, password);
        showToast('注册成功，请登录！', 'success');
        switchTab('login');
        document.getElementById('login-username').value = username;
        btn.textContent = '注册';
        btn.disabled = false;
      } catch (err) {
        showError(err.message);
        btn.textContent = '注册';
        btn.disabled = false;
      }
    }
  </script>

  <style>
    .auth-error {
      background: rgba(255, 59, 48, 0.15);
      border: 1px solid rgba(255, 59, 48, 0.3);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
      color: #ff6b6b;
      font-size: 0.85rem;
      width: 100%;
      text-align: center;
    }
  </style>
</body>
</html>
