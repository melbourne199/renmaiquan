<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源星河 · 中国聚焦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #050508;
            display: flex;
            flex-direction: column;
        }

        /* ==================== 顶部导航 ==================== */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(to bottom, rgba(5,5,8,0.95) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #D6B26E, #B8944A);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #050508;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
        }
        .logo-title {
            font-size: 20px;
            font-weight: 700;
            color: #D6B26E;
            letter-spacing: 2px;
        }
        .logo-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }
        .nav-links {
            display: flex;
            gap: 40px;
        }
        .nav-link {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .nav-link:hover {
            color: #D6B26E;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #D6B26E;
            transition: width 0.3s;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .user-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            width: 240px;
            height: 38px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(214,178,110,0.2);
            border-radius: 20px;
            padding: 0 20px 0 40px;
            font-size: 13px;
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: rgba(214,178,110,0.5);
            background: rgba(255,255,255,0.08);
            width: 300px;
        }
        .search-box input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 14px;
        }
        .user-btn {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #D6B26E, #B8944A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .user-btn:hover {
            transform: scale(1.1);
        }

        /* ==================== 主区域 ==================== */
        .main-area {
            flex: 1;
            position: relative;
            display: flex;
        }

        /* ==================== 3D地球画布 ==================== */
        #earthCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ==================== 动态星空背景 ==================== */
        .starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: var(--min-opacity); transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ==================== 底部功能卡片 ==================== */
        .feature-cards {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            z-index: 50;
        }
        .feature-card {
            width: 180px;
            height: 140px;
            background: rgba(15,15,20,0.85);
            border: 1px solid rgba(214,178,110,0.25);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #D6B26E, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .feature-card:hover::before {
            opacity: 1;
        }
        .feature-card:hover {
            transform: translateY(-10px);
            border-color: rgba(214,178,110,0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(214,178,110,0.1);
        }
        .feature-card:active {
            transform: translateY(-5px) scale(0.98);
        }
        .feature-icon {
            font-size: 42px;
            margin-bottom: 14px;
        }
        .feature-name {
            font-size: 16px;
            font-weight: 600;
            color: #D6B26E;
            margin-bottom: 6px;
        }
        .feature-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            line-height: 1.4;
        }
        .feature-card .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(0,212,255,0.2) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .feature-card:hover .glow {
            opacity: 1;
        }

        /* ==================== 左下角统计 ==================== */
        .stats-panel {
            position: fixed;
            left: 40px;
            bottom: 40px;
            z-index: 50;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-icon {
            width: 36px;
            height: 36px;
            background: rgba(15,15,20,0.8);
            border: 1px solid rgba(214,178,110,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .stat-info {
            display: flex;
            flex-direction: column;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #D6B26E;
        }
        .stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
        }

        /* ==================== 右下角时间 ==================== */
        .time-panel {
            position: fixed;
            right: 40px;
            bottom: 40px;
            text-align: right;
            z-index: 50;
        }
        .time-date {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 4px;
        }
        .time-value {
            font-size: 32px;
            font-weight: 300;
            color: #D6B26E;
            letter-spacing: 2px;
        }
        .time-location {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            margin-top: 4px;
        }

        /* ==================== 城市呼吸高亮 ==================== */
        .city-pulse {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 30px #00d4ff;
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
            z-index: 10;
        }
        .city-pulse::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid #00d4ff;
            border-radius: 50%;
            animation: pulse-ring 2s ease-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        /* ==================== 标题文字 ==================== */
        .hero-title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }
        .hero-title h1 {
            font-size: 48px;
            font-weight: 700;
            color: #D6B26E;
            text-shadow: 0 0 40px rgba(214,178,110,0.5);
            letter-spacing: 8px;
            margin-bottom: 16px;
        }
        .hero-title p {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 4px;
        }
        .hero-title .scroll-hint {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            animation: scroll-hint 2s ease-in-out infinite;
        }
        @keyframes scroll-hint {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 0.8; transform: translateY(5px); }
        }

        /* ==================== Toast ==================== */
        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(10,10,15,0.95);
            border: 1px solid #D6B26E;
            border-radius: 12px;
            padding: 14px 32px;
            color: #D6B26E;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="logo-section">
            <div class="logo-icon">夜</div>
            <div class="logo-text">
                <div class="logo-title">资源夜市一条街</div>
                <div class="logo-sub">全国人脉资源对接平台</div>
            </div>
        </div>
        <div class="nav-links">
            <div class="nav-link">首页</div>
            <div class="nav-link">群码大厅</div>
            <div class="nav-link">项目广场</div>
            <div class="nav-link">企业资源</div>
            <div class="nav-link">关于我们</div>
        </div>
        <div class="user-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="搜索群、项目、资源...">
            </div>
            <div class="user-btn">👤</div>
        </div>
    </nav>

    <!-- 动态星空背景 -->
    <div class="starfield" id="starfield"></div>

    <!-- 3D地球 -->
    <canvas id="earthCanvas"></canvas>

    <!-- 主标题 -->
    <div class="hero-title">
        <h1>资源星河 · 中国聚焦</h1>
        <p>汇聚全国优质人脉资源 · 让信息流动 · 让合作发生</p>
        <div class="scroll-hint">↓ 向下滚动探索</div>
    </div>

    <!-- 底部功能卡片 -->
    <div class="feature-cards">
        <div class="feature-card" onclick="navigateTo('groups')">
            <div class="glow"></div>
            <div class="feature-icon">👥</div>
            <div class="feature-name">群码资源</div>
            <div class="feature-desc">加入优质人脉群<br>拓展商业资源圈</div>
        </div>
        <div class="feature-card" onclick="navigateTo('projects')">
            <div class="glow"></div>
            <div class="feature-icon">🚀</div>
            <div class="feature-name">项目机会</div>
            <div class="feature-desc">发现创业项目<br>对接投资机会</div>
        </div>
        <div class="feature-card" onclick="navigateTo('helps')">
            <div class="glow"></div>
            <div class="feature-icon">🤝</div>
            <div class="feature-name">互助信息</div>
            <div class="feature-desc">资源互换合作<br>共赢商业机会</div>
        </div>
        <div class="feature-card" onclick="navigateTo('enterprise')">
            <div class="glow"></div>
            <div class="feature-icon">🏢</div>
            <div class="feature-name">企业资源</div>
            <div class="feature-desc">企业级资源对接<br>商务合作平台</div>
        </div>
    </div>

    <!-- 左下角统计 -->
    <div class="stats-panel">
        <div class="stat-item">
            <div class="stat-icon">👥</div>
            <div class="stat-info">
                <div class="stat-value" id="statUsers">2,847</div>
                <div class="stat-label">注册用户</div>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-icon">📱</div>
            <div class="stat-info">
                <div class="stat-value" id="statGroups">1,263</div>
                <div class="stat-label">优质群码</div>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-icon">🔥</div>
            <div class="stat-info">
                <div class="stat-value" id="statViews">58.6K</div>
                <div class="stat-label">今日浏览</div>
            </div>
        </div>
    </div>

    <!-- 右下角时间 -->
    <div class="time-panel">
        <div class="time-date" id="timeDate"></div>
        <div class="time-value" id="timeValue"></div>
        <div class="time-location">📍 中国 · 北京</div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==================== Toast提示 ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== 动态星空 ====================
        function createStarfield() {
            const container = document.getElementById('starfield');
            const starCount = 300;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--min-opacity', Math.random() * 0.3 + 0.1);
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        // ==================== 时间显示 ====================
        function updateTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            const timeStr = now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            document.getElementById('timeDate').textContent = dateStr;
            document.getElementById('timeValue').textContent = timeStr;
        }

        // ==================== 3D地球 ====================
        let scene, camera, renderer, earth, wireframe, glow;
        const cityPositions = [
            { lon: 116.4, lat: 39.9, name: '北京' },
            { lon: 121.4, lat: 31.2, name: '上海' },
            { lon: 113.2, lat: 23.1, name: '广州' },
            { lon: 114.1, lat: 22.5, name: '深圳' },
            { lon: 120.1, lat: 30.2, name: '杭州' },
            { lon: 104.0, lat: 30.6, name: '成都' },
            { lon: 108.9, lat: 34.2, name: '西安' },
            { lon: 118.7, lat: 32.0, name: '南京' },
            { lon: 106.5, lat: 29.5, name: '重庆' },
            { lon: 112.9, lat: 28.2, name: '长沙' },
            { lon: 117.2, lat: 39.1, name: '天津' },
            { lon: 126.5, lat: 45.8, name: '长春' },
            { lon: 123.4, lat: 41.8, name: '沈阳' },
            { lon: 114.4, lat: 38.0, name: '石家庄' },
            { lon: 120.9, lat: 31.8, name: '苏州' },
            { lon: 113.5, lat: 22.2, name: '东莞' },
            { lon: 121.5, lat: 25.0, name: '台北' },
            { lon: 114.1, lat: 22.3, name: '香港' },
            { lon: 113.3, lat: 23.1, name: '澳门' }
        ];
        const cityMarkers = [];

        function initEarth() {
            const canvas = document.getElementById('earthCanvas');
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // 地球主体 - 深蓝色
            const earthGeo = new THREE.SphereGeometry(1.8, 64, 64);
            const earthMat = new THREE.MeshPhongMaterial({
                color: 0x1a3a5c,
                emissive: 0x0a1929,
                specular: 0x333333,
                shininess: 15
            });
            earth = new THREE.Mesh(earthGeo, earthMat);
            scene.add(earth);

            // 网格线
            const wireGeo = new THREE.SphereGeometry(1.82, 36, 18);
            const wireMat = new THREE.MeshBasicMaterial({
                color: 0x4a90d9,
                wireframe: true,
                transparent: true,
                opacity: 0.12
            });
            wireframe = new THREE.Mesh(wireGeo, wireMat);
            scene.add(wireframe);

            // 外围光晕
            const glowGeo = new THREE.SphereGeometry(2.2, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0x1a4a7a,
                transparent: true,
                opacity: 0.08,
                side: THREE.BackSide
            });
            glow = new THREE.Mesh(glowGeo, glowMat);
            scene.add(glow);

            // 中国区域高亮（亚洲东部）
            const chinaSpotGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const chinaSpotMat = new THREE.MeshBasicMaterial({
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.6
            });

            // 添加城市光点标记
            cityPositions.forEach(city => {
                const phi = (90 - city.lat) * Math.PI / 180;
                const theta = (city.lon + 180) * Math.PI / 180;
                const x = -2 * Math.sin(phi) * Math.cos(theta);
                const y = 2 * Math.cos(phi);
                const z = 2 * Math.sin(phi) * Math.sin(theta);

                // 城市点
                const markerGeo = new THREE.SphereGeometry(0.04, 12, 12);
                const markerMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff });
                const marker = new THREE.Mesh(markerGeo, markerMat);
                marker.position.set(x, y, z);
                scene.add(marker);
                cityMarkers.push({ marker, city });

                // 呼吸光环
                const ringGeo = new THREE.RingGeometry(0.06, 0.1, 32);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: 0x00d4ff,
                    transparent: true,
                    opacity: 0.5,
                    side: THREE.DoubleSide
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.set(x, y, z);
                ring.lookAt(0, 0, 0);
                scene.add(ring);
                cityMarkers[cityMarkers.length - 1].ring = ring;
            });

            // 光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 3, 5);
            scene.add(directionalLight);

            // 聚焦中国的相机位置
            setTimeout(() => {
                animateCameraTo(2.5, 0.8, 3.5);
            }, 1000);

            animate();
        }

        // 相机动画过渡
        let targetCameraPos = { x: 0, y: 0, z: 5 };
        let currentCameraPos = { x: 0, y: 0, z: 5 };

        function animateCameraTo(x, y, z) {
            targetCameraPos = { x, y, z };
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        // ==================== 动画循环 ====================
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // 平滑相机移动
            currentCameraPos.x = lerp(currentCameraPos.x, targetCameraPos.x, 0.02);
            currentCameraPos.y = lerp(currentCameraPos.y, targetCameraPos.y, 0.02);
            currentCameraPos.z = lerp(currentCameraPos.z, targetCameraPos.z, 0.02);
            camera.position.set(currentCameraPos.x, currentCameraPos.y, currentCameraPos.z);
            camera.lookAt(0, 0, 0);

            // 地球自转
            earth.rotation.y += 0.001;
            wireframe.rotation.y += 0.0015;
            glow.rotation.y -= 0.0005;

            // 中国区域呼吸效果
            const breathe = Math.sin(time * 0.8) * 0.03 + 1;
            earth.scale.set(breathe, breathe, breathe);

            // 城市光点呼吸
            cityMarkers.forEach((item, index) => {
                const phase = time * 1.5 + index * 0.3;
                const scale = 1 + Math.sin(phase) * 0.3;
                item.marker.scale.set(scale, scale, scale);

                if (item.ring) {
                    item.ring.material.opacity = 0.3 + Math.sin(phase) * 0.2;
                    const ringScale = 1 + Math.sin(phase * 0.5) * 0.3;
                    item.ring.scale.set(ringScale, ringScale, ringScale);
                }
            });

            renderer.render(scene, camera);
        }

        // ==================== 响应式 ====================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==================== 交互 ====================
        function navigateTo(type) {
            switch(type) {
                case 'groups':
                    showToast('正在跳转到群码大厅...');
                    setTimeout(() => window.location.href = '/index.html?tab=groups', 800);
                    break;
                case 'projects':
                    showToast('正在跳转到项目广场...');
                    setTimeout(() => window.location.href = '/index.html?tab=projects', 800);
                    break;
                case 'helps':
                    showToast('正在跳转到互助广场...');
                    setTimeout(() => window.location.href = '/index.html?tab=helps', 800);
                    break;
                case 'enterprise':
                    showToast('正在跳转到企业资源...');
                    setTimeout(() => window.location.href = '/index.html?tab=enterprise', 800);
                    break;
            }
        }

        // 鼠标拖拽旋转地球
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        document.getElementById('earthCanvas').addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            targetCameraPos.x += deltaX * 0.005;
            targetCameraPos.y -= deltaY * 0.005;

            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        // 滚轮缩放
        document.getElementById('earthCanvas').addEventListener('wheel', (e) => {
            e.preventDefault();
            targetCameraPos.z += e.deltaY * 0.002;
            targetCameraPos.z = Math.max(2.5, Math.min(8, targetCameraPos.z));
        });

        // ==================== 初始化 ====================
        createStarfield();
        initEarth();
        updateTime();
        setInterval(updateTime, 1000);

        // 更新统计数据
        async function updateStats() {
            try {
                const [groups, users] = await Promise.all([
                    fetch('/api/groups').then(r => r.json()),
                    fetch('/api/auth/me').then(r => r.ok ? r.json() : { count: 2847 }).catch(() => ({ count: 2847 }))
                ]);
                document.getElementById('statGroups').textContent = (groups.length || 1263).toLocaleString();
                document.getElementById('statUsers').textContent = '2,847';
                document.getElementById('statViews').textContent = Math.floor(Math.random() * 30 + 50) + '.6K';
            } catch (e) {
                // 静默失败
            }
        }
        updateStats();
    </script>
</body>
</html>
