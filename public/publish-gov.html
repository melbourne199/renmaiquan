<!DOCTYPE html>
<html>
<head><title>发布政务信息</title>
<style>body{font-family:system-ui;padding:16px;background:#f5f5f7;}select{width:100%;padding:14px;border:1px solid #eee;border-radius:14px;margin-bottom:16px;}.btn{background:#0071E3;color:white;border:none;border-radius:30px;padding:16px;width:100%;}</style>
</head>
<body>
    <h2>发布政务信息</h2>
    <select><option>税务</option><option>环保</option></select>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
        <select style="flex:1"><option>广东省</option></select>
        <select style="flex:1"><option>深圳市</option></select>
        <select style="flex:1"><option>南山区</option></select>
    </div>
    <select><option>A级</option><option>B级</option></select>
    <select><option>一般</option><option>熟悉</option></select>
    <select><option>有</option><option>无</option></select>
    <select><option>1个月</option><option>3个月</option></select>
    <div style="background:#fff3e0;padding:12px;border-radius:12px;margin-bottom:16px;">⚠️ 请勿填写具体部门名称、职务</div>
    <button class="btn">提交审核</button>
</body>
</html>
