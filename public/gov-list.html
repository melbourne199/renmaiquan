<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>政企资源 - 资源夜市</title>
  <style>
    :root {
      --bg-deep: #01060f;
      --bg-card: rgba(15, 30, 50, 0.85);
      --bg-card-hover: rgba(20, 40, 65, 0.9);
      --border-card: rgba(90, 200, 250, 0.15);
      --border-card-hover: rgba(90, 200, 250, 0.35);
      --accent-blue: #5ac8fa;
      --accent-blue-light: #72d2ff;
      --text-primary: rgba(200, 220, 240, 0.92);
      --text-secondary: rgba(160, 185, 210, 0.80);
      --text-muted: rgba(130, 155, 185, 0.65);
      --gold: #F59E0B;
      --success: #34C759;
      --glass-blur: blur(20px);
      --shadow-card: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(90, 200, 250, 0.08);
      --shadow-card-hover: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(90, 200, 250, 0.15);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; }
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: rgba(1, 6, 15, 0.8); backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--border-card); }
    .navbar-brand { display: flex; align-items: center; gap: 10px; color: var(--text-primary); text-decoration: none; font-size: 1.1rem; font-weight: 600; }
    .navbar-links { display: flex; gap: 24px; }
    .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; cursor: pointer; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: var(--accent-blue); }
    .navbar-actions { display: flex; gap: 12px; }
    .btn { padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.25s var(--ease-spring); border: none; text-decoration: none; }
    .btn-primary { background: var(--accent-blue); color: #000; font-weight: 600; }
    .btn-primary:hover { background: var(--accent-blue-light); transform: scale(1.02); }
    .btn-outline { background: transparent; color: var(--accent-blue); border: 1px solid var(--border-card); }
    .btn-outline:hover { border-color: var(--accent-blue); background: var(--bg-card); }
    .container { max-width: 1200px; margin: 0 auto; padding: 84px 20px 40px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    .page-title { font-size: 1.4rem; font-weight: 600; }
    .tabs { display: flex; gap: 8px; background: var(--bg-card); padding: 4px; border-radius: 24px; border: 1px solid var(--border-card); }
    .tab { padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); }
    .tab:hover { color: var(--text-primary); }
    .tab.active { background: var(--accent-blue); color: #000; font-weight: 600; }
    .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .gov-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s var(--ease-spring); }
    .gov-card:hover { transform: translateY(-4px); border-color: var(--border-card-hover); box-shadow: var(--shadow-card-hover); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; }
    .card-title { font-size: 1rem; font-weight: 600; flex: 1; }
    .card-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag { padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 500; }
    .tag-level { background: rgba(90, 200, 250, 0.15); color: var(--accent-blue); }
    .tag-industry { background: rgba(245, 158, 11, 0.15); color: var(--gold); }
    .card-desc { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--border-card); }
    .card-meta { display: flex; gap: 16px; font-size: 0.8rem; color: var(--text-muted); }
    .meta-item { display: flex; align-items: center; gap: 4px; }
    .time-ago { font-size: 0.75rem; color: var(--text-muted); }
    .action-btn { padding: 6px 14px; border-radius: 16px; font-size: 0.8rem; background: var(--accent-blue); color: #000; font-weight: 600; border: none; cursor: pointer; }
    .action-btn:hover { background: var(--accent-blue-light); }
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .loading { grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text-muted); }
    .publish-fab { position: fixed; bottom: 32px; right: 32px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent-blue); color: #000; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 30px rgba(90, 200, 250, 0.4); transition: all 0.3s var(--ease-spring); border: none; z-index: 50; }
    .publish-fab:hover { transform: scale(1.1); }
    @media (max-width: 800px) { .cards-grid { grid-template-columns: 1fr; } .navbar-links { display: none; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand"><span>🌌</span><span>资源夜市</span></a>
    <div class="navbar-links">
      <a href="index.html" class="nav-link">首页</a>
      <a href="groups.html" class="nav-link">行业群码</a>
      <span class="nav-link active">政企资源</span>
      <a href="help-detail.html" class="nav-link">最新求助</a>
      <a href="finance.html" class="nav-link">民企金融</a>
      <a href="escort.html" class="nav-link">居间护航</a>
      <a href="case-list.html" class="nav-link">资源案例</a>
    </div>
    <div class="navbar-actions">
      <a href="login.html" class="btn btn-outline">登录</a>
      <a href="register.html" class="btn btn-primary">注册</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1 class="page-title">政企资源</h1>
      <div class="tabs">
        <span class="tab active" data-sort="latest">最新发布</span>
        <span class="tab" data-sort="hot">最热资源</span>
      </div>
    </div>
    <div class="cards-grid" id="cardsGrid"><div class="loading">加载中...</div></div>
  </div>

  <button class="publish-fab" onclick="location.href='publish-gov.html'" title="发布资源">+</button>

  <script>
    let govList = [];
    let currentSort = 'latest';

    async function loadGov() {
      try {
        const res = await fetch('/api/government');
        if (!res.ok) throw new Error('加载失败');
        govList = await res.json();
        renderCards();
      } catch (e) {
        document.getElementById('cardsGrid').innerHTML = '<div class="empty-state">暂无政企资源</div>';
      }
    }

    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      if (govList.length === 0) {
        grid.innerHTML = '<div class="empty-state">暂无政企资源</div>';
        return;
      }
      grid.innerHTML = govList.map(g => {
        const timeAgo = getTimeAgo(g.created_at);
        return `
          <div class="gov-card" onclick="location.href='gov-detail.html?id=${g.id}'">
            <div class="card-header">
              <div class="card-title">${g.business_type || '资源对接'}</div>
              <div class="card-tags">
                <span class="tag tag-level">${g.level_code || '省级'}</span>
                <span class="tag tag-industry">${g.familiarity || '一般了解'}</span>
              </div>
            </div>
            <div class="card-desc">${g.detail || '暂无详细说明'}</div>
            <div class="card-footer">
              <div class="card-meta">
                <span class="meta-item">📍 ${g.province || ''}${g.city || ''}${g.district || ''}</span>
              </div>
              <span class="time-ago">${timeAgo}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function getTimeAgo(dateStr) {
      if (!dateStr) return '未知';
      const diff = Date.now() - new Date(dateStr).getTime();
      const days = Math.floor(diff / 86400000);
      if (days === 0) return '今天';
      if (days === 1) return '昨天';
      if (days < 30) return days + '天前';
      const months = Math.floor(days / 30);
      if (months < 12) return months + '月前';
      return Math.floor(months / 12) + '年前';
    }

    // Tab切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentSort = tab.dataset.sort;
        // 简单排序演示
        if (currentSort === 'hot') {
          govList.sort((a, b) => (b.view_count || 0) - (a.view_count || 0));
        } else {
          govList.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        }
        renderCards();
      });
    });

    loadGov();
  </script>
</body>
</html>
