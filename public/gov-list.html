<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>政企资源 - 资源夜市</title>
  <style>
    :root {
      --bg-deep: #01060f;
      --bg-card: rgba(90, 200, 250, 0.06);
      --bg-card-hover: rgba(90, 200, 250, 0.12);
      --border-card: rgba(90, 200, 250, 0.15);
      --border-card-hover: rgba(90, 200, 250, 0.35);
      --accent-blue: #5ac8fa;
      --accent-blue-light: #72d2ff;
      --text-primary: rgba(228, 240, 252, 0.96);
      --text-secondary: rgba(180, 200, 220, 0.75);
      --text-muted: rgba(150, 180, 210, 0.6);
      --gold: #F59E0B;
      --success: #34C759;
      --glass-blur: blur(20px);
      --shadow-card: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(90, 200, 250, 0.08);
      --shadow-card-hover: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(90, 200, 250, 0.15);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; }
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: rgba(1, 6, 15, 0.8); backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--border-card); }
    .navbar-brand { display: flex; align-items: center; gap: 10px; color: var(--text-primary); text-decoration: none; font-size: 1.1rem; font-weight: 600; }
    .navbar-links { display: flex; gap: 24px; }
    .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; cursor: pointer; }
    .nav-link:hover, .nav-link.active { color: var(--accent-blue); }
    .navbar-actions { display: flex; gap: 12px; }
    .btn { padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.25s var(--ease-spring); border: none; text-decoration: none; }
    .btn-primary { background: var(--accent-blue); color: #000; font-weight: 600; }
    .btn-primary:hover { background: var(--accent-blue-light); transform: scale(1.02); }
    .btn-outline { background: transparent; color: var(--accent-blue); border: 1px solid var(--border-card); }
    .container { max-width: 1200px; margin: 0 auto; padding: 84px 20px 40px; }
    .banner-carousel { display: flex; gap: 16px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; }
    .banner-card { flex: 1; min-width: 280px; height: 80px; background: linear-gradient(135deg, rgba(90, 200, 250, 0.15) 0%, rgba(90, 200, 250, 0.05) 100%); border: 1px solid var(--border-card); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.25s var(--ease-spring); }
    .banner-card:hover { border-color: var(--accent-blue); transform: scale(1.02); }
    .banner-icon { font-size: 1.5rem; }
    .banner-content { flex: 1; }
    .banner-title { font-size: 0.9rem; font-weight: 600; }
    .banner-desc { font-size: 0.75rem; color: var(--text-muted); }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    .page-title { font-size: 1.4rem; font-weight: 600; }
    .level-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .level-tag { padding: 6px 14px; border-radius: 16px; font-size: 0.8rem; cursor: pointer; background: var(--bg-card); border: 1px solid var(--border-card); color: var(--text-secondary); transition: all 0.2s; }
    .level-tag:hover { border-color: var(--accent-blue); color: var(--text-primary); }
    .level-tag.active { background: var(--accent-blue); color: #000; font-weight: 600; border-color: var(--accent-blue); }
    .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .resource-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s var(--ease-spring); }
    .resource-card:hover { transform: translateY(-4px); border-color: var(--border-card-hover); box-shadow: var(--shadow-card-hover); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .level-badge { padding: 4px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
    .level-national { background: rgba(214, 178, 110, 0.2); color: var(--gold); border: 1px solid var(--gold); }
    .level-provincial { background: rgba(90, 200, 250, 0.15); color: var(--accent-blue); }
    .level-city { background: rgba(52, 199, 89, 0.15); color: var(--success); }
    .level-district { background: rgba(150, 180, 210, 0.15); color: var(--text-muted); }
    .card-type { font-size: 0.85rem; color: var(--accent-blue); margin-bottom: 4px; }
    .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 8px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--border-card); }
    .stars { color: var(--gold); }
    .time-ago { font-size: 0.75rem; color: var(--text-muted); }
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .loading { grid-column: 1 / -1; text-align: center; padding: 60px; color: var(--text-muted); }
    .publish-fab { position: fixed; bottom: 32px; right: 32px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent-blue); color: #000; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 30px rgba(90, 200, 250, 0.4); transition: all 0.3s var(--ease-spring); border: none; z-index: 50; }
    .publish-fab:hover { transform: scale(1.1); }
    @media (max-width: 800px) { .cards-grid { grid-template-columns: 1fr; } .navbar-links { display: none; } .banner-carousel { flex-direction: column; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand"><span>🌌</span><span>资源夜市</span></a>
    <div class="navbar-links">
      <a href="index.html" class="nav-link">首页</a>
      <a href="groups.html" class="nav-link">行业群码</a>
      <span class="nav-link active">政企资源</span>
      <a href="help-detail.html" class="nav-link">最新求助</a>
      <a href="finance.html" class="nav-link">民企金融</a>
      <a href="escort.html" class="nav-link">居间护航</a>
      <a href="case-list.html" class="nav-link">资源案例</a>
    </div>
    <div class="navbar-actions">
      <a href="login.html" class="btn btn-outline">登录</a>
      <a href="register.html" class="btn btn-primary">注册</a>
    </div>
  </nav>

  <div class="container">
    <div class="banner-carousel">
      <div class="banner-card"><div class="banner-icon">🏭</div><div class="banner-content"><div class="banner-title">智能制造政企对接会</div><div class="banner-desc">长三角优质制造企业专场</div></div></div>
      <div class="banner-card"><div class="banner-icon">💰</div><div class="banner-content"><div class="banner-title">金融扶持政策专场</div><div class="banner-desc">中小微企业融资绿色通道</div></div></div>
      <div class="banner-card"><div class="banner-icon">🤝</div><div class="banner-content"><div class="banner-title">招商投资对接会</div><div class="banner-desc">全国重点项目集中展示</div></div></div>
    </div>

    <div class="page-header">
      <h1 class="page-title">政企资源</h1>
      <div class="level-tags">
        <span class="level-tag active" data-level="all">全部</span>
        <span class="level-tag" data-level="顶层">顶层</span>
        <span class="level-tag" data-level="省级">省级</span>
        <span class="level-tag" data-level="市级">市级</span>
        <span class="level-tag" data-level="区级">区县级</span>
      </div>
    </div>

    <div class="cards-grid" id="cardsGrid"><div class="loading">加载中...</div></div>
  </div>

  <button class="publish-fab" onclick="location.href='publish-gov.html'" title="发布资源">+</button>

  <script>
    let currentLevel = 'all';
    let resources = [];

    async function loadResources() {
      try {
        const res = await fetch('/api/government');
        if (!res.ok) throw new Error('加载失败');
        resources = await res.json();
        renderCards();
      } catch (e) {
        document.getElementById('cardsGrid').innerHTML = '<div class="empty-state">暂无数据</div>';
      }
    }

    function getLevelClass(level) {
      switch (level) { case '顶层': return 'level-national'; case '省级': return 'level-provincial'; case '市级': return 'level-city'; default: return 'level-district'; }
    }

    function getTimeAgo(dateStr) {
      if (!dateStr) return '';
      const diff = Date.now() - new Date(dateStr).getTime();
      const days = Math.floor(diff / 86400000);
      if (days === 0) return '今天';
      if (days === 1) return '昨天';
      if (days < 30) return days + '天前';
      return Math.floor(days / 30) + '月前';
    }

    function renderCards() {
      const grid = document.getElementById('cardsGrid');
      const filtered = currentLevel === 'all' ? resources : resources.filter(r => r.level_code === currentLevel);
      if (filtered.length === 0) { grid.innerHTML = '<div class="empty-state">暂无资源</div>'; return; }
      grid.innerHTML = filtered.map(r => `
        <div class="resource-card" onclick="location.href='gov-detail.html?id=${r.id}'">
          <div class="card-header">
            <span class="level-badge ${getLevelClass(r.level_code)}">${r.level_code || '其他'}</span>
            <span class="stars">${r.familiarity === '非常熟悉' ? '★★' : r.familiarity === '比较熟悉' ? '★' : ''}</span>
          </div>
          <div class="card-type">${r.business_type || '综合业务'}</div>
          <div class="card-title">${r.province || ''}${r.city || ''}${r.district || ''}</div>
          <div class="card-footer">
            <span class="time-ago">${getTimeAgo(r.created_at)}</span>
            <button class="btn btn-primary" style="padding:6px 14px;border-radius:16px;font-size:0.8rem;" onclick="event.stopPropagation()">立即对接</button>
          </div>
        </div>
      `).join('');
    }

    document.querySelectorAll('.level-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('.level-tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        currentLevel = tag.dataset.level;
        renderCards();
      });
    });

    loadResources();
  </script>
</body>
</html>
