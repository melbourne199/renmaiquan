<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI文档解析 · 资源夜市</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-card: #111827;
      --border: #1e2d45;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --success: #10b981;
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .type-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .type-tab {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .type-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.05);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .upload-zone h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .upload-zone p {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .file-preview {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .file-preview.show { display: flex; }

    .file-icon { font-size: 1.4rem; }
    .file-name { flex: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { color: var(--text-muted); font-size: 0.75rem; }
    .file-remove { color: var(--text-muted); cursor: pointer; font-size: 1rem; }
    .file-remove:hover { color: #ef4444; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #1e40af; opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover { border-color: var(--accent); }

    .progress-wrap { display: none; margin-bottom: 20px; }
    .progress-wrap.show { display: block; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }

    .result-card {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .result-card.show { display: block; }

    .result-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-item label {
      display: block;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .result-item span {
      font-size: 0.85rem;
    }

    .result-summary {
      background: rgba(59, 130, 246, 0.08);
      border-left: 3px solid var(--accent);
      padding: 10px 14px;
      border-radius: 0 6px 6px 0;
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .report-section {
      background: var(--bg-primary);
      border-radius: 8px;
      padding: 16px;
      font-size: 0.85rem;
      line-height: 1.8;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .ocr-tip {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .ocr-tip strong { color: var(--warning); }

    .steps {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    .step {
      text-align: center;
      padding: 12px 8px;
      background: var(--bg-card);
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .step-icon { font-size: 1.2rem; margin-bottom: 4px; }
    .step.active { color: var(--text); border: 1px solid var(--accent); }
    .step.done { color: var(--success); border: 1px solid var(--success); }

    @media (max-width: 600px) {
      .result-grid { grid-template-columns: 1fr; }
      .steps { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>📄 AI 文档解析</h1>
      <p>上传文件，AI 自动提取信息填表 · 完全免费</p>
    </div>

    <!-- 流程步骤 -->
    <div class="steps">
      <div class="step" id="step1">
        <div class="step-icon">📤</div>
        <div>上传文件</div>
      </div>
      <div class="step" id="step2">
        <div class="step-icon">🔍</div>
        <div>AI 解析</div>
      </div>
      <div class="step" id="step3">
        <div class="step-icon">📋</div>
        <div>生成报告</div>
      </div>
    </div>

    <!-- 类型选择 -->
    <div class="type-tabs">
      <button class="type-tab active" data-type="gov_resource">🏛️ 政务资源</button>
      <button class="type-tab" data-type="enterprise">🏢 企业信息</button>
      <button class="type-tab" data-type="contract">📃 合同分析</button>
    </div>

    <!-- 上传区 -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*,.pdf">
      <div class="upload-icon">📎</div>
      <h3>点击或拖拽上传文件</h3>
      <p>支持图片（截图/扫描件）、PDF · 纯本地处理，不上传原始文件</p>
    </div>

    <!-- 文件预览 -->
    <div class="file-preview" id="filePreview">
      <span class="file-icon">📄</span>
      <span class="file-name" id="fileName"></span>
      <span class="file-size" id="fileSize"></span>
      <span class="file-remove" id="fileRemove">✕</span>
    </div>

    <!-- OCR 提示 -->
    <div class="ocr-tip">
      <strong>💡 提示：</strong>系统会先用 OCR 提取文件中的文字，再由 AI 分析结构化信息。<br>
      上传的截图/扫描件越清晰，识别准确率越高。纯文本直接复制粘贴效果最佳。
    </div>

    <!-- 进度条 -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressLabel">识别中...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- 按钮 -->
    <div class="btn-row">
      <button class="btn btn-primary" id="parseBtn" disabled>🔍 开始解析</button>
      <button class="btn btn-secondary" id="resetBtn">🔄 重置</button>
    </div>

    <!-- 解析结果 -->
    <div class="result-card" id="resultCard">
      <div class="result-title">📋 AI 解析结果</div>
      <div class="result-grid" id="resultGrid"></div>
      <div class="result-summary" id="resultSummary"></div>
      <div class="score-badge" id="scoreBadge">⭐ 评分：<span id="scoreValue">--</span> / 100</div>
      <div class="result-title" style="margin-top:16px">📑 AI 评估报告</div>
      <div class="report-section" id="reportContent"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="copyBtn">📋 复制报告</button>
        <button class="btn btn-secondary" onclick="location.href='publish-gov.html'">➡️ 去发布</button>
      </div>
    </div>
  </div>

  <!-- Tesseract.js OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script>
    let selectedType = 'gov_resource';
    let selectedFile = null;
    let extractedText = '';
    let parsedData = null;
    let reportData = null;

    // 类型切换
    document.querySelectorAll('.type-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        selectedType = tab.dataset.type;
      });
    });

    // 文件选择
    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const filePreview = document.getElementById('filePreview');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const parseBtn = document.getElementById('parseBtn');

    fileInput.addEventListener('change', e => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = (file.size / 1024).toFixed(1) + ' KB';
      filePreview.classList.add('show');
      parseBtn.disabled = false;
      document.getElementById('resultCard').classList.remove('show');
    }

    document.getElementById('fileRemove').addEventListener('click', () => {
      selectedFile = null;
      extractedText = '';
      fileInput.value = '';
      filePreview.classList.remove('show');
      parseBtn.disabled = true;
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      selectedFile = null;
      extractedText = '';
      fileInput.value = '';
      filePreview.classList.remove('show');
      parseBtn.disabled = true;
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('progressWrap').classList.remove('show');
      setStep(1);
    });

    function setStep(n) {
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById('step' + i);
        el.classList.remove('active', 'done');
        if (i < n) el.classList.add('done');
        else if (i === n) el.classList.add('active');
      }
    }

    function setProgress(pct, label) {
      document.getElementById('progressWrap').classList.add('show');
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressPct').textContent = pct + '%';
      if (label) document.getElementById('progressLabel').textContent = label;
    }

    parseBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      parseBtn.disabled = true;
      setStep(2);
      setProgress(0, 'OCR 识别中...');

      try {
        // OCR
        const result = await Tesseract.recognize(selectedFile, 'chi_sim+eng', {
          logger: m => {
            if (m.status === 'recognizing text') {
              setProgress(Math.round(m.progress * 40), 'OCR 识别中...');
            }
          }
        });
        extractedText = result.data.text.trim();
        setProgress(40, 'OCR 完成，AI 解析中...');

        if (!extractedText) {
          extractedText = selectedFile.name.replace(/\.[^.]+$/, '');
        }

        setProgress(50, 'AI 分析中...');

        // 调用后端 AI 解析
        const parseRes = await fetch('/api/ai/parse', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: extractedText, type: selectedType })
        });
        const parseJson = await parseRes.json();
        setProgress(75, '生成报告中...');
        parsedData = parseJson.data;

        // 生成报告
        const reportRes = await fetch('/api/ai/generate-report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: selectedType, data: parsedData })
        });
        const reportJson = await reportRes.json();
        reportData = reportJson;

        setProgress(100, '完成！');
        setStep(3);
        showResult(parsedData, reportJson);
      } catch (err) {
        alert('解析失败：' + err.message);
        parseBtn.disabled = false;
        setStep(1);
      }
    });

    function showResult(data, report) {
      const card = document.getElementById('resultCard');
      card.classList.add('show');

      const grid = document.getElementById('resultGrid');
      const fields = {
        gov_resource: [
          { label: '省份', key: 'province' },
          { label: '城市', key: 'city' },
          { label: '行业', key: 'business_type' },
          { label: '层级', key: 'level_code' },
          { label: '熟悉程度', key: 'familiarity' }
        ],
        enterprise: [
          { label: '企业名称', key: 'name' },
          { label: '行业', key: 'industry' },
          { label: '规模', key: 'scale' },
          { label: '主营业务', key: 'main_product' }
        ],
        contract: [
          { label: '甲方', key: 'party_a' },
          { label: '乙方', key: 'party_b' },
          { label: '金额', key: 'amount' },
          { label: '期限', key: 'duration' }
        ]
      };

      const typeFields = fields[selectedType] || fields.gov_resource;
      grid.innerHTML = typeFields.map(f =>
        `<div class="result-item"><label>${f.label}</label><span>${data[f.key] || '—'}</span></div>`
      ).join('');

      document.getElementById('resultSummary').textContent = data.summary || '';
      document.getElementById('scoreValue').textContent = report.score || '--';
      document.getElementById('reportContent').textContent = report.report || '';
    }

    document.getElementById('copyBtn').addEventListener('click', () => {
      const text = document.getElementById('reportContent').textContent;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copyBtn').textContent = '✅ 已复制';
        setTimeout(() => document.getElementById('copyBtn').textContent = '📋 复制报告', 2000);
      });
    });
  </script>
</body>
</html>
