<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资源夜市 · 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #0a0a0c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .phone-frame {
            width: 375px;
            background: #0b0b0b;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            border: 1px solid #3a2e1c;
            position: relative;
        }
        .phone-screen {
            height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ==================== 3D地球区域 ==================== */
        .earth-section {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 380px;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0c 100%);
            z-index: 5;
            overflow: hidden;
        }
        #earthCanvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .earth-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, #0b0b0b 0%, transparent 100%);
            pointer-events: none;
        }
        .earth-title {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }
        .earth-title h1 {
            font-size: 22px;
            font-weight: 700;
            color: #D6B26E;
            text-shadow: 0 0 20px rgba(214,178,110,0.5);
            margin-bottom: 8px;
        }
        .earth-title p {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        /* ==================== 顶部搜索栏 ==================== */
        .top-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
            background: linear-gradient(to bottom, rgba(10,10,12,0.9) 0%, transparent 100%);
        }
        .logo-area {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-area img {
            max-width: 100%;
            height: auto;
        }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #D6B26E, #B8944A);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #0a0a0c;
        }
        .search-box {
            flex: 1;
            margin: 0 12px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(214,178,110,0.3);
            border-radius: 18px;
            padding: 0 16px 0 36px;
            font-size: 14px;
            color: #fff;
            outline: none;
        }
        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .search-box input:focus {
            border-color: rgba(214,178,110,0.6);
            background: rgba(255,255,255,0.15);
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #D6B26E, #B8944A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }

        /* ==================== 功能卡片区 ==================== */
        .feature-cards {
            position: absolute;
            bottom: 120px;
            left: 12px;
            right: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            z-index: 15;
        }
        .feature-card {
            background: rgba(26,26,26,0.9);
            border: 1px solid rgba(214,178,110,0.3);
            border-radius: 12px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .feature-card:hover {
            background: rgba(40,40,40,0.95);
            border-color: rgba(214,178,110,0.6);
            transform: translateY(-2px);
        }
        .feature-card:active {
            transform: scale(0.95);
        }
        .feature-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }
        .feature-name {
            font-size: 11px;
            color: #D6B26E;
            font-weight: 500;
        }

        /* ==================== 分类标签栏 ==================== */
        .category-tabs {
            position: absolute;
            bottom: 70px;
            left: 0;
            right: 0;
            padding: 0 12px;
            z-index: 15;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar {
            display: none;
        }
        .tab-item {
            flex-shrink: 0;
            padding: 8px 16px;
            background: rgba(30,30,30,0.9);
            border: 1px solid rgba(214,178,110,0.2);
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-item.active {
            background: linear-gradient(135deg, rgba(214,178,110,0.3), rgba(214,178,110,0.1));
            border-color: #D6B26E;
            color: #D6B26E;
        }
        .tab-item:active {
            transform: scale(0.95);
        }

        /* ==================== 内容区域 ==================== */
        .content-section {
            position: absolute;
            top: 380px;
            left: 0;
            right: 0;
            bottom: 60px;
            background: #0b0b0b;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .content-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(214,178,110,0.1);
        }
        .content-title {
            font-size: 14px;
            color: #D6B26E;
            font-weight: 600;
        }
        .content-more {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .content-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            scrollbar-width: none;
        }
        .content-list::-webkit-scrollbar {
            display: none;
        }

        /* 资源卡片 */
        .resource-item {
            display: flex;
            background: rgba(26,26,26,0.8);
            border: 1px solid rgba(214,178,110,0.15);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .resource-item:hover {
            background: rgba(35,35,35,0.9);
            border-color: rgba(214,178,110,0.4);
        }
        .resource-item:active {
            transform: scale(0.98);
        }
        .resource-qr {
            width: 70px;
            height: 70px;
            background: #1a170f;
            border: 1px solid rgba(214,178,110,0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-right: 12px;
            overflow: hidden;
        }
        .resource-qr img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .resource-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }
        .resource-name {
            font-size: 14px;
            color: #f0e2c5;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .resource-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .resource-meta {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }
        .resource-meta span {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
        }
        .resource-tag {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #f39c12;
            color: #fff;
        }
        .resource-item {
            position: relative;
        }
        .resource-item.senior .resource-tag {
            background: #e74c3c;
        }
        .resource-item.ad {
            background: linear-gradient(135deg, rgba(214,178,110,0.15), rgba(214,178,110,0.05));
            border-color: rgba(214,178,110,0.4);
        }

        /* ==================== 底部导航 ==================== */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #121212;
            border-top: 1px solid rgba(214,178,110,0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            flex: 1;
            height: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            transition: all 0.2s;
        }
        .nav-item.active {
            color: #D6B26E;
        }
        .nav-item i {
            font-size: 20px;
            line-height: 1;
        }
        .nav-item span {
            font-size: 10px;
        }
        .nav-item:active {
            transform: scale(0.9);
        }

        /* ==================== Toast ==================== */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0,0,0,0.9);
            border: 1px solid #D6B26E;
            border-radius: 12px;
            padding: 16px 32px;
            color: #D6B26E;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ==================== 加载动画 ==================== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid rgba(214,178,110,0.3);
            border-top-color: #D6B26E;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-screen">
            <!-- 顶部搜索栏 -->
            <header class="top-header">
                <div class="logo-area">
                    <div class="logo-placeholder">夜</div>
                </div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索群、项目、资源...">
                </div>
                <div class="user-avatar" id="userAvatar" onclick="goToUser()">👤</div>
            </header>

            <!-- 3D地球区域 -->
            <div class="earth-section">
                <canvas id="earthCanvas"></canvas>
                <div class="earth-overlay"></div>
                <div class="earth-title">
                    <h1>资源星河 · 中国聚焦</h1>
                    <p>汇聚全国优质人脉资源</p>
                </div>

                <!-- 功能卡片 -->
                <div class="feature-cards">
                    <div class="feature-card" onclick="navigateTo('groups')">
                        <div class="feature-icon">👥</div>
                        <div class="feature-name">群码</div>
                    </div>
                    <div class="feature-card" onclick="navigateTo('projects')">
                        <div class="feature-icon">🚀</div>
                        <div class="feature-name">项目</div>
                    </div>
                    <div class="feature-card" onclick="navigateTo('helps')">
                        <div class="feature-icon">🤝</div>
                        <div class="feature-name">互助</div>
                    </div>
                    <div class="feature-card" onclick="navigateTo('enterprise')">
                        <div class="feature-icon">🏢</div>
                        <div class="feature-name">企业</div>
                    </div>
                </div>

                <!-- 分类标签 -->
                <div class="category-tabs" id="categoryTabs"></div>
            </div>

            <!-- 内容列表 -->
            <div class="content-section">
                <div class="content-header">
                    <span class="content-title" id="contentTitle">🔥 热门资源</span>
                    <span class="content-more" onclick="loadMore()">查看更多 ></span>
                </div>
                <div class="content-list" id="contentList">
                    <div class="loading">加载中</div>
                </div>
            </div>

            <!-- 底部导航 -->
            <nav class="bottom-nav">
                <div class="nav-item active"><i>🏠</i><span>首页</span></div>
                <div class="nav-item" onclick="navigateTo('publish')"><i>📤</i><span>发布</span></div>
                <div class="nav-item" onclick="navigateTo('message')"><i>💬</i><span>消息</span></div>
                <div class="nav-item" onclick="goToUser()"><i>👤</i><span>我的</span></div>
            </nav>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/scripts/app.js"></script>
    <script>
        // ==================== 全局状态 ====================
        let currentTab = 'groups';
        let currentCategory = '全部分类';
        const categories = [
            '全部分类', 'IT互联网', '教育培训', '金融投资', '房地产',
            '餐饮美食', '医疗健康', '旅游出行', '制造业', '电商',
            '政府机构', '其他'
        ];

        // ==================== Toast提示 ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== 3D地球动画 ====================
        function initEarth() {
            const canvas = document.getElementById('earthCanvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });

            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // 地球
            const earthGeometry = new THREE.SphereGeometry(1.5, 64, 64);
            const earthMaterial = new THREE.MeshBasicMaterial({
                color: 0x1a3a5c,
                wireframe: false
            });
            const earth = new THREE.Mesh(earthGeometry, earthMaterial);
            scene.add(earth);

            // 经纬线
            const wireframeGeo = new THREE.SphereGeometry(1.52, 36, 18);
            const wireframeMat = new THREE.MeshBasicMaterial({
                color: 0x4a90d9,
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });
            const wireframe = new THREE.Mesh(wireframeGeo, wireframeMat);
            scene.add(wireframe);

            // 光晕
            const glowGeo = new THREE.SphereGeometry(1.8, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0x4a90d9,
                transparent: true,
                opacity: 0.08,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            scene.add(glow);

            // 城市光点
            const cityPositions = [
                [116.4, 39.9, '北京'], [121.4, 31.2, '上海'], [113.2, 23.1, '广州'],
                [114.1, 22.5, '深圳'], [120.1, 30.2, '杭州'], [104.0, 30.6, '成都'],
                [108.9, 34.2, '西安'], [118.7, 32.0, '南京'], [106.5, 29.5, '重庆'],
                [112.9, 28.2, '长沙'], [117.2, 39.1, '天津'], [125.3, 43.8, '长春'],
                [126.5, 45.8, '哈尔滨'], [123.4, 41.8, '沈阳'], [114.4, 38.0, '石家庄']
            ];

            cityPositions.forEach(([lon, lat, name]) => {
                const phi = (90 - lat) * Math.PI / 180;
                const theta = (lon + 180) * Math.PI / 180;
                const x = -1.6 * Math.sin(phi) * Math.cos(theta);
                const y = 1.6 * Math.cos(phi);
                const z = 1.6 * Math.sin(phi) * Math.sin(theta);

                const pointGeo = new THREE.SphereGeometry(0.025, 8, 8);
                const pointMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff });
                const point = new THREE.Mesh(pointGeo, pointMat);
                point.position.set(x, y, z);
                scene.add(point);
            });

            camera.position.z = 5;

            // 动画
            let animationPhase = 0;
            function animate() {
                requestAnimationFrame(animate);

                animationPhase += 0.005;

                // 初始飞入动画
                if (camera.position.z > 3.5) {
                    camera.position.z -= 0.02;
                }

                earth.rotation.y += 0.002;
                wireframe.rotation.y += 0.002;
                glow.rotation.y -= 0.001;

                // 中国区域微微放大
                const scale = 1 + Math.sin(animationPhase) * 0.02;
                earth.scale.set(scale, scale, scale);

                renderer.render(scene, camera);
            }
            animate();

            // 响应式
            window.addEventListener('resize', () => {
                camera.aspect = canvas.clientWidth / canvas.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            });
        }

        // ==================== 分类标签 ====================
        function renderCategories() {
            const container = document.getElementById('categoryTabs');
            container.innerHTML = categories.map(cat =>
                `<div class="tab-item ${cat === currentCategory ? 'active' : ''}" onclick="selectCategory('${cat}')">${cat}</div>`
            ).join('');
        }

        function selectCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadContent();
        }

        // ==================== 内容加载 ====================
        async function loadContent() {
            const list = document.getElementById('contentList');
            list.innerHTML = '<div class="loading">加载中</div>';

            try {
                let data = [];
                switch(currentTab) {
                    case 'groups':
                        data = await publicApi.getGroups();
                        break;
                    case 'projects':
                        data = await publicApi.getProjects();
                        break;
                    case 'helps':
                        data = await publicApi.getHelps();
                        break;
                    case 'enterprise':
                        data = await publicApi.getEnterpriseLikes();
                        break;
                }

                // 分类筛选
                if (currentCategory !== '全部分类') {
                    data = data.filter(item => item.industry === currentCategory);
                }

                renderContent(data);
            } catch (error) {
                console.error('加载失败:', error);
                list.innerHTML = '<div class="loading">加载失败，请重试</div>';
            }
        }

        function renderContent(items) {
            const list = document.getElementById('contentList');
            if (!items || items.length === 0) {
                list.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }

            list.innerHTML = items.slice(0, 20).map((item, index) => {
                const isAd = index === 2 && Math.random() > 0.5;
                const isSenior = item.level === 'senior' || item.isPremium;

                return `
                    <div class="resource-item ${isSenior ? 'senior' : ''} ${isAd ? 'ad' : ''}" onclick="viewDetail('${currentTab}', ${item.id})">
                        <span class="resource-tag">${isSenior ? '高级' : '普通'}</span>
                        <div class="resource-qr">
                            ${item.qrCode ? `<img src="${item.qrCode}" alt="二维码">` : '📱'}
                        </div>
                        <div class="resource-info">
                            <div class="resource-name">${escapeHtml(item.name || item.title)}</div>
                            <div class="resource-desc">${escapeHtml(item.description || item.content || item.summary || '')}</div>
                            <div class="resource-meta">
                                <span>👥 ${item.memberCount || item.members || 0}</span>
                                <span>📍 ${item.city || item.location || '全国'}</span>
                                <span>🏷️ ${item.industry || item.category || '综合'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // 插入广告卡片
            if (list.children.length > 3) {
                const adItem = document.createElement('div');
                adItem.className = 'resource-item ad';
                adItem.innerHTML = `
                    <span class="resource-tag" style="background:#D6B26E;color:#000;">推荐</span>
                    <div class="resource-info" style="margin-left:0;">
                        <div class="resource-name">✨ 想让你的资源被更多人看到？</div>
                        <div class="resource-desc">申请推荐位，让曝光率提升300%</div>
                        <button onclick="event.stopPropagation(); showToast('请联系客服申请')"
                                style="margin-top:8px;background:#D6B26E;color:#000;border:none;padding:6px 12px;border-radius:15px;font-size:11px;cursor:pointer;">
                            立即申请
                        </button>
                    </div>
                `;
                list.insertBefore(adItem, list.children[3]);
            }
        }

        // ==================== 导航功能 ====================
        function navigateTo(type) {
            switch(type) {
                case 'groups':
                    currentTab = 'groups';
                    document.getElementById('contentTitle').textContent = '👥 群码资源';
                    loadContent();
                    break;
                case 'projects':
                    currentTab = 'projects';
                    document.getElementById('contentTitle').textContent = '🚀 项目机会';
                    loadContent();
                    break;
                case 'helps':
                    currentTab = 'helps';
                    document.getElementById('contentTitle').textContent = '🤝 互助信息';
                    loadContent();
                    break;
                case 'enterprise':
                    currentTab = 'enterprise';
                    document.getElementById('contentTitle').textContent = '🏢 企业资源';
                    loadContent();
                    break;
                case 'publish':
                    if (!auth.isLoggedIn()) {
                        showToast('请先登录');
                        setTimeout(() => window.location.href = '/login.html', 1000);
                        return;
                    }
                    window.location.href = '/publish.html';
                    break;
                case 'message':
                    showToast('消息功能开发中');
                    break;
            }
        }

        function viewDetail(type, id) {
            window.location.href = `/detail.html?type=${type}&id=${id}`;
        }

        function goToUser() {
            if (!auth.isLoggedIn()) {
                window.location.href = '/login.html';
            } else {
                window.location.href = '/user.html';
            }
        }

        function loadMore() {
            showToast('正在加载更多...');
            setTimeout(loadContent, 500);
        }

        // ==================== 搜索功能 ====================
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const keyword = this.value.trim();
                if (keyword) {
                    showToast(`搜索: ${keyword}`);
                }
            }
        });

        // ==================== 底部导航 ====================
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (auth.isLoggedIn()) {
                const user = storage.getUser();
                if (user) {
                    document.getElementById('userAvatar').textContent = user.username ? user.username[0].toUpperCase() : '👤';
                }
            }

            // 初始化3D地球
            initEarth();

            // 渲染分类
            renderCategories();

            // 加载内容
            loadContent();
        });
    </script>
</body>
</html>
