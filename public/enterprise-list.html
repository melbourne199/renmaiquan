<!DOCTYPE html>
<html>
<head><title>企业资源列表</title>
<style>body { font-family: system-ui; padding:16px; background:#f5f5f7; }
.search { background:white; border-radius:30px; padding:10px; margin-bottom:16px; }
.card { background:white; border-radius:16px; padding:12px; margin-bottom:12px; }
.tag.supply { background:#1e7e34; color:white; padding:2px 8px; border-radius:12px; display:inline-block; }
.tag.demand { background:#d70015; color:white; padding:2px 8px; border-radius:12px; display:inline-block; }
.meta { display:flex; justify-content:space-between; font-size:0.7rem; color:#999; margin-top:8px; }
</style>
</head>
<body>
    <h2>企业资源</h2>
    <div class="search">🔍 搜索...</div>
    <div class="card">
        <span class="tag supply">供</span>
        <div style="font-weight:600;">某科技公司</div>
        <div style="font-size:0.8rem; color:#666;">技术部 · 北京</div>
        <div class="meta"><span>2026-03-10</span></div>
    </div>
    <div class="card">
        <span class="tag demand">需</span>
        <div style="font-weight:600;">高端制造融资</div>
        <div style="font-size:0.8rem; color:#666;">需资500万 · 深圳</div>
        <div class="meta"><span>2026-03-08</span></div>
    </div>
</body>
</html>
